spring.application.name=programatico-api
# Desativa Docker Compose na subida (use H2 em memória sem Docker)
spring.docker.compose.enabled=false

# JWT
jwt.secret=programatico-api-secret-key-minimo-256-bits-para-hs256-seguro
jwt.expiration-ms=86400000

# H2 (desenvolvimento) - use spring.profiles.active=mysql para MySQL
spring.datasource.url=jdbc:h2:mem:programatico
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

