spring.application.name=programatico-api
# Desativa Docker Compose na subida (use H2 em memória sem Docker)
spring.docker.compose.enabled=false

# JWT
jwt.secret=programatico-api-secret-key-minimo-256-bits-para-hs256-seguro
jwt.expiration-ms=86400000

# H2 (desenvolvimento) - use spring.profiles.active=mysql para MySQL
spring.datasource.url=jdbc:h2:mem:programatico
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SMTP (Gmail) — use App Password, not real password
# https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.test-connection=false

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:5173,http://127.0.0.1:5173}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.ngrok-free.dev,https://*.ngrok-free.app,https://*.ngrok.io}

# Frontend URL (usado em emails)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# AbacatePay — cadastre no painel: https://sua-api/api/webhooks/abacatepay?webhookSecret=SEU_SECRET
# Secret definido por você ao criar o webhook (query param webhookSecret).
abacatepay.webhook.secret=${ABACATEPAY_WEBHOOK_SECRET:}
# Chave HMAC pública documentada em https://docs.abacatepay.com/pages/webhooks/security
abacatepay.webhook.hmac-key=${ABACATEPAY_WEBHOOK_HMAC_KEY:t9dXRhHHo3yDEj5pVDYz0frf7q6bMKyMRmxxCPIPp3RCplBfXRxqlC6ZpiWmOqj4L63qEaeUOtrCI8P0VMUgo6iIga2ri9ogaHFs0WIIywSMg0q7RmBfybe1E5XJcfC4IW3alNqym0tXoAKkzvfEjZxV6bE0oG2zJrNNYmUCKZyV0KZ3JS8Votf9EAWWYdiDkMkpbMdPggfh1EqHlVkMiTady6jOR3hyzGEHrIz2Ret0xHKMbiqkr9HS1JhNHDX9}
# Exige header X-Webhook-Signature (desative só em testes locais se necessário).
abacatepay.webhook.require-hmac=${ABACATEPAY_WEBHOOK_REQUIRE_HMAC:true}
# AbacatePay — checkout dinâmico (POST /checkouts/create)
abacatepay.api-key=${ABACATEPAY_API_KEY:}
abacatepay.api-base-url=${ABACATEPAY_API_BASE_URL:https://api.abacatepay.com/v2}
# ID do produto Root na loja AbacatePay (ex.: prod_abc123xyz)
abacatepay.product-id=${ABACATEPAY_PRODUCT_ID:}
# Fallback: URL fixa se API key ou product-id não estiverem configurados
abacatepay.checkout-url=${ABACATEPAY_CHECKOUT_URL:}
# Dias de validade do plano ROOT após pagamento confirmado
abacatepay.root-duration-days=${ABACATEPAY_ROOT_DURATION_DAYS:30}

# Usuário admin padrão (criado automaticamente na inicialização)
admin.email=${ADMIN_EMAIL:admin@programatico.com}
admin.password=${ADMIN_PASSWORD:Admin@123456}
admin.username=${ADMIN_USERNAME:admin}

