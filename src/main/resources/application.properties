spring.application.name=programatico-api
# Desativa Docker Compose na subida (use H2 em memória sem Docker)
spring.docker.compose.enabled=false

# JWT
jwt.secret=programatico-api-secret-key-minimo-256-bits-para-hs256-seguro
jwt.expiration-ms=86400000

# H2 (desenvolvimento) - use spring.profiles.active=mysql para MySQL
spring.datasource.url=jdbc:h2:mem:programatico
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SMTP (Gmail) — use App Password, not real password
# https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.test-connection=false

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:5173,http://127.0.0.1:5173}

# Frontend URL (usado em emails)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

