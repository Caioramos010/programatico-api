spring.application.name=api
server.port=8080

# BANCO
spring.datasource.url=jdbc:mysql://localhost:3306/programatico
spring.datasource.username=seu_usuario
spring.datasource.password=sua_senha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
# "update" cria/atualiza as tabelas automaticamente no banco baseado nas suas @Entities
spring.jpa.hibernate.ddl-auto=update
# Mostra o SQL gerado no console (ótimo para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SEGURANÇA / JWT
api.security.token.secret=${JWT_SECRET:chave-secreta-padrao-para-ambiente-de-desenvolvimento-123}